<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Anteii · Inventario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E8671A;--gr:#3a3a3a;--gr2:#7a7a7a;--bg:#f0f0f0;--wh:#fff;--bd:#e2e2e2;--rad:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--gr)}

header{background:var(--or);padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(232,103,26,.35)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hdr-top h1{font-size:18px;font-weight:800;color:#fff}
.update-bar{font-size:11px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.15);border-radius:6px;padding:5px 10px;margin-bottom:12px;display:inline-block}

.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:14px 44px 14px 46px;border:none;border-radius:12px;font-size:16px;font-weight:500;background:#fff;color:var(--gr);outline:none;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.search-box input::placeholder{color:#b0b0b0;font-weight:400}
.s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
.clr{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#b0b0b0;cursor:pointer;display:none;line-height:1}

.filters{display:flex;gap:6px;padding:0 0 12px;overflow-x:auto}
.filters::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:none;background:rgba(255,255,255,.25);color:rgba(255,255,255,.9);white-space:nowrap;cursor:pointer;transition:all .15s}
.chip.active{background:#fff;color:var(--or)}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--bd)}
.kpi{background:var(--bg);border-radius:var(--rad);padding:10px 12px}
.kpi-lbl{font-size:10px;color:var(--gr2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.kpi-val{font-size:17px;font-weight:800;color:var(--or);line-height:1}
.kpi-sub{font-size:10px;color:var(--gr2);margin-top:2px}

.bar{padding:7px 16px;font-size:12px;color:var(--gr2);background:#fff;border-bottom:1px solid var(--bd)}

.list{padding:10px 12px 80px}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 2px 5px;font-size:11px;font-weight:800;color:var(--or);text-transform:uppercase;letter-spacing:.6px}
.sec-badge{background:var(--or);color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}

.card{background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid var(--bd);overflow:hidden}
.card-head{padding:12px 14px 10px}
.card-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.clave{font-size:12px;font-weight:800;color:var(--or);font-family:monospace;letter-spacing:.3px}
.exist-pill{background:var(--or);color:#fff;border-radius:8px;padding:3px 10px;font-size:13px;font-weight:800;white-space:nowrap}
.desc{font-size:13px;font-weight:600;color:var(--gr);line-height:1.35;margin-bottom:4px}
.card-meta{font-size:11px;color:var(--gr2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.tag-eyejal{background:#e3f2fd;color:#1565c0}
.tag-40eye{background:#e8f5e9;color:#2e7d32}
.tag-gto{background:#f3e5f5;color:#6a1b9a}

.lots{border-top:1px solid var(--bd)}
.lot{display:grid;grid-template-columns:1fr auto;gap:4px;padding:9px 14px;border-bottom:1px solid #f5f5f5;align-items:center}
.lot:last-child{border-bottom:none}
.lot-lote{font-family:monospace;font-size:11px;color:var(--gr2)}
.lot-alm{margin:2px 0}
.lot-cad{font-size:10px;margin-top:2px}
.cad-ok{color:var(--gr2)}
.cad-warn{color:#e65100}
.cad-venc{color:#c62828}
.lot-right{text-align:right}
.lot-qty{font-size:15px;font-weight:800;color:var(--gr)}
.lot-unit{font-size:10px;color:var(--gr2)}

.empty{padding:60px 24px;text-align:center;color:var(--gr2)}
.empty-ico{font-size:44px;margin-bottom:10px}
.fab{position:fixed;bottom:20px;right:16px;background:var(--or);color:#fff;border:none;border-radius:12px;padding:11px 18px;font-size:12px;font-weight:700;box-shadow:0 4px 14px rgba(232,103,26,.45);cursor:pointer;z-index:99}
</style>
</head>

const map={};
RAW.forEach(r=>{
  if(!map[r.clave]) map[r.clave]={clase:r.clase,clave:r.clave,desc:r.desc,lotes:[],alms:new Set()};
  map[r.clave].lotes.push(r);
  map[r.clave].alms.add(r.almacen);
});
const ALL=Object.values(map).map(p=>({...p,alms:[...p.alms],totalExist:p.lotes.reduce((s,l)=>s+l.exist,0)}));

let fF='TODOS',fS='';
const fmt=n=>n.toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:2});

function cadInfo(s){
  if(!s)return{cls:'cad-ok',txt:''};
  const p=s.split('/');
  if(p.length<3)return{cls:'cad-ok',txt:s};
  const diff=(new Date(+p[2],+p[1]-1,+p[0])-new Date())/864e5;
  if(diff<0) return{cls:'cad-venc',txt:'⚠ Vencido · '+s};
  if(diff<90)return{cls:'cad-warn',txt:'⏳ Por vencer · '+s};
  return{cls:'cad-ok',txt:s};
}
function almTag(a){
  if(a==='EYEJAL')return'<span class="tag tag-eyejal">EYEJAL</span>';
  if(a==='40EYE') return'<span class="tag tag-40eye">40EYE</span>';
  return'<span class="tag tag-gto">'+a+'</span>';
}

function getF(){
  const q=fS.toLowerCase().trim();
  return ALL.filter(p=>{
    if(fF==='EYEJAL'&&!p.alms.includes('EYEJAL'))return false;
    if(fF==='40EYE' &&!p.alms.includes('40EYE')) return false;
    if(['EYE','GRA','MAQ','PT','GTO'].includes(fF)&&p.clase!==fF)return false;
    if(q&&!p.clave.toLowerCase().includes(q)&&!p.desc.toLowerCase().includes(q))return false;
    return true;
  });
}

function render(){
  const items=getF();
  const lotes=items.reduce((s,p)=>s+p.lotes.length,0);
  const exist=items.reduce((s,p)=>s+p.totalExist,0);
  document.getElementById('k-exist').textContent=fmt(exist);
  document.getElementById('k-lotes').textContent=lotes.toLocaleString('es-MX');
  document.getElementById('k-claves').textContent=items.length.toLocaleString('es-MX');
  document.getElementById('bar-info').textContent=items.length+' artículos · '+lotes+' lotes';

  const list=document.getElementById('list'),empty=document.getElementById('empty');
  if(!items.length){list.innerHTML='';empty.style.display='block';document.getElementById('empty-q').textContent=fS;return;}
  empty.style.display='none';

  const order=['EYE','GRA','MAQ','PT','GTO'],groups={};
  items.forEach(p=>{if(!groups[p.clase])groups[p.clase]=[];groups[p.clase].push(p);});

  list.innerHTML=order.filter(c=>groups[c]).map(c=>{
    return'<div class="sec-hdr"><span class="sec-badge">'+c+'</span>'+groups[c].length+' artículos</div>'+
    groups[c].map(p=>{
      const lots=p.lotes.map(l=>{
        const cad=cadInfo(l.caducidad);
        return`<div class="lot"><div><div class="lot-lote">${l.lote}</div><div class="lot-alm">${almTag(l.almacen)}</div>${cad.txt?`<div class="lot-cad ${cad.cls}">${cad.txt}</div>`:''}</div><div class="lot-right"><div class="lot-qty">${fmt(l.exist)}</div><div class="lot-unit">${l.unidad||'pzas'}</div></div></div>`;
      }).join('');
      return`<div class="card"><div class="card-head"><div class="card-row1"><span class="clave">${p.clave}</span><span class="exist-pill">${fmt(p.totalExist)}</span></div><div class="desc">${p.desc}</div><div class="card-meta">${p.lotes.length} lote${p.lotes.length>1?'s':''}&nbsp;${p.alms.map(almTag).join('')}</div></div><div class="lots">${lots}</div></div>`;
    }).join('');
  }).join('');
}

let t;
document.getElementById('search').addEventListener('input',function(){
  clearTimeout(t);t=setTimeout(()=>{fS=this.value;document.getElementById('clr').style.display=fS?'block':'none';render();},200);
});
function clearSearch(){document.getElementById('search').value='';fS='';document.getElementById('clr').style.display='none';render();}
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',function(){
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  this.classList.add('active');fF=this.dataset.f;render();
}));
render();
</script>
